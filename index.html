<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GMDSS Test System</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div id="app"></div>

<script>
const QUESTIONS = [
  {
    id: 2,
    question: 'What is the emission designation for VHF-FM?',
    answers: ['F3C', 'J2B', 'F3E', 'G2B'],
    correct: 2,
  },
  {
    id: 13,
    question: 'The correct mode of emission for HF radiotelephony SSB transmission is',
    answers: ['J3E', 'H3E', 'F1B', 'G3E'],
    correct: 0,
  },
  {
    id: 64,
    question: 'What is the emission designation for MF-HF voice signals?',
    answers: ['F1B', 'J3E', 'J2B', 'F3E'],
    correct: 1,
  },
  {
    id: 68,
    question: 'Which emission mode occupies the most bandwidth?',
    answers: ['J2B', 'J3E', 'F1B', 'F3E'],
    correct: 3,
  },
  {
    id: 69,
    question: 'Which mode occupies the least bandwidth?',
    answers: ['H3E', 'J2B', 'G3E', 'F3E'],
    correct: 1,
  }
];

let currentQuestion = 0;
let correctAnswers = 0;
let selectedAnswer = null;
let mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');

function saveMistakes() {
  localStorage.setItem('mistakes', JSON.stringify(mistakes));
}

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];

  document.getElementById('app').innerHTML = `
    <div class="min-h-screen flex justify-center p-6">

      <div class="w-full max-w-4xl">

        <!-- HEADER -->
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-6 shadow-sm">
          <div class="flex justify-between items-center flex-wrap gap-3">

            <div>
              <h1 class="text-2xl font-bold">GMDSS Test System</h1>
              <p class="text-gray-500 text-sm mt-1">
                Question ${currentQuestion + 1} of ${QUESTIONS.length}
              </p>
            </div>

            <button
              onclick="resetTest()"
              class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-semibold"
            >
              Reset test
            </button>

          </div>
        </div>

        <!-- QUESTION -->
        <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

          <h2 class="text-xl md:text-2xl font-semibold mb-8">
            ${q.question}
          </h2>

          <div class="space-y-3">

            ${q.answers.map((answer, index) => `
              <button
                onclick="selectAnswer(${index})"
                id="answer-${index}"
                class="w-full text-left p-4 rounded-xl border border-gray-200 bg-gray-50 hover:border-gray-400 transition"
              >
                <div class="flex items-center gap-4">

                  <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold text-sm">
                    ${String.fromCharCode(65 + index)}
                  </div>

                  <div>
                    ${answer}
                  </div>

                </div>
              </button>
            `).join('')}

          </div>

          <!-- FOOTER -->
          <div class="mt-8 flex justify-between items-center">

            <div class="text-gray-500">
              Correct answers: ${correctAnswers}
            </div>

            <button
              onclick="nextQuestion()"
              id="nextBtn"
              disabled
              class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-5 py-2.5 rounded-xl font-semibold"
            >
              Next question
            </button>

          </div>

        </div>
      </div>
    </div>
  `;
}

function selectAnswer(index) {
  if (selectedAnswer !== null) return;

  selectedAnswer = index;

  const q = QUESTIONS[currentQuestion];

  q.answers.forEach((_, i) => {
    const btn = document.getElementById(`answer-${i}`);

    btn.className =
      "w-full text-left p-4 rounded-xl border border-gray-200 bg-gray-50";

    if (i === q.correct) {
      btn.classList.add("border-green-500", "bg-green-100");
    }

    if (i === index && i !== q.correct) {
      btn.classList.add("border-red-500", "bg-red-100");
    }
  });

  if (index === q.correct) {
    correctAnswers++;
  } else {
    if (!mistakes.find(m => m.id === q.id)) {
      mistakes.push(q);
      saveMistakes();
    }
  }

  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  currentQuestion++;
  selectedAnswer = null;

  if (currentQuestion >= QUESTIONS.length) {
    finishTest();
    return;
  }

  renderQuestion();
}

function finishTest() {
  document.getElementById('app').innerHTML = `
    <div class="min-h-screen flex items-center justify-center p-6">

      <div class="bg-white border border-gray-200 rounded-2xl p-10 shadow-sm text-center max-w-xl w-full">

        <h1 class="text-4xl font-bold mb-6">Test completed</h1>

        <div class="text-xl mb-3">
          Correct:
          <span class="text-green-600 font-bold">${correctAnswers}</span>
        </div>

        <div class="text-xl mb-8">
          Mistakes:
          <span class="text-red-500 font-bold">${QUESTIONS.length - correctAnswers}</span>
        </div>

        <button
          onclick="resetTest()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold"
        >
          Restart
        </button>

      </div>
    </div>
  `;
}

function resetTest() {
  currentQuestion = 0;
  correctAnswers = 0;
  selectedAnswer = null;
  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
